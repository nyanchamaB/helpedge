name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Hello @${{ github.actor }} , thank you for opening your first issue. We'll take a look soon!"
        pr-message: "Welcome @${{ github.actor }}! Thank you for your contribution, we'll review your PR shortly."
